<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Tracker — Config</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
  :root {
    --bg: #0d0d0b; --amber: #ffb300; --amber-dim: #7a5500;
    --amber-glow: rgba(255,179,0,0.06); --amber-bright: #ffd54f;
    --green: #69f0ae; --red: #ff3d00; --row-border: rgba(255,179,0,0.08);
    --board: rgba(255,179,0,0.02);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--amber);
    font-family: 'Share Tech Mono', monospace; min-height: 100vh; padding-bottom: 40px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 1000;
  }
  .board-header {
    background: var(--amber); color: var(--bg);
    padding: 10px 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 0;
  }
  .board-title { font-family: 'VT323', monospace; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; }
  .board-sub { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; }
  .nav-links { margin-left: auto; display: flex; gap: 12px; }
  .nav-links a {
    font-family: 'VT323', monospace; font-size: 20px; letter-spacing: 2px;
    background: var(--bg); color: var(--amber); padding: 2px 12px; text-decoration: none;
  }
  .nav-links a:hover { background: var(--amber); color: var(--bg); }

  .ticker {
    background: rgba(255,179,0,0.12); border-bottom: 1px solid var(--amber-dim);
    padding: 6px 20px; font-size: 12px; letter-spacing: 2px; color: var(--amber-dim);
  }

  .content { padding: 20px 16px; }

  .section {
    border: 1px solid var(--amber-dim); margin-bottom: 16px;
    background: var(--board);
  }
  .section-header {
    font-family: 'VT323', monospace; font-size: 20px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--amber-bright);
    padding: 10px 16px; border-bottom: 1px solid var(--amber-dim);
    background: rgba(255,179,0,0.04);
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: rgba(255,179,0,0.08); }
  .section-body { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
  .section-body.single { grid-template-columns: 1fr; }
  @media (max-width: 600px) {
    .section-body { grid-template-columns: 1fr; }
    #api-sources-list { flex-direction: column !important; }
  }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--amber-dim);
  }
  .field input, .field select {
    background: #0a0a08; border: 1px solid var(--amber-dim); color: var(--amber);
    font-family: 'Share Tech Mono', monospace; font-size: 14px;
    padding: 7px 10px; outline: none; width: 100%;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--amber); }
  .field input[type="checkbox"] {
    width: auto; height: 16px; cursor: pointer; accent-color: var(--amber);
  }
  .field.checkbox { flex-direction: row; align-items: center; gap: 10px; }
  .field.checkbox label { font-size: 13px; letter-spacing: 1px; margin: 0; color: var(--amber); }
  .field .hint { font-size: 11px; color: var(--amber-dim); margin-top: 2px; }

  .keys-list { display: flex; flex-direction: column; gap: 6px; }
  .key-row { display: flex; gap: 8px; align-items: center; }
  .key-row input { flex: 1; }
  .key-btn {
    background: transparent; border: 1px solid var(--amber-dim); color: var(--amber-dim);
    font-family: 'Share Tech Mono', monospace; font-size: 18px;
    padding: 4px 10px; cursor: pointer; line-height: 1;
  }
  .key-btn:hover { border-color: var(--amber); color: var(--amber); }

  .actions {
    display: flex; gap: 12px; align-items: center;
    padding: 16px; border-top: 1px solid var(--amber-dim);
    position: sticky; bottom: 0; background: var(--bg); z-index: 10;
  }
  .btn {
    font-family: 'VT323', monospace; font-size: 20px; letter-spacing: 2px;
    padding: 6px 20px; cursor: pointer; border: none; text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-save { background: var(--amber); color: var(--bg); }
  .btn-save:hover:not(:disabled) { background: var(--amber-bright); }
  .btn-reset { background: transparent; border: 1px solid var(--amber-dim); color: var(--amber-dim); }
  .btn-reset:hover { border-color: var(--amber); color: var(--amber); }

  #status {
    font-size: 13px; letter-spacing: 1px;
    transition: opacity 0.5s;
  }
  #status.ok { color: var(--green); }
  #status.err { color: var(--red); }

  .zone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .zone-label {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--amber-dim); margin-bottom: 4px;
  }

  .loading { text-align: center; padding: 40px; color: var(--amber-dim);
    font-family: 'VT323', monospace; font-size: 24px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* ── WiFi ─────────────────────────────────────────────────────────────── */
  .wifi-status-bar {
    display: flex; flex-wrap: wrap; gap: 0.25rem 2rem;
    background: rgba(255,179,0,0.04); border: 1px solid rgba(255,179,0,0.12);
    border-radius: 2px; padding: 10px 14px; margin-bottom: 12px;
  }
  .wifi-stat { display: flex; flex-direction: column; gap: 3px; }
  .wifi-stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--amber-dim); }
  .wifi-stat-value { font-family: 'VT323', monospace; font-size: 22px; color: var(--amber); letter-spacing: 1px; }
  .wifi-stat-value.connected    { color: var(--green); }
  .wifi-stat-value.disconnected { color: var(--red); }
  .wifi-scan-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .wifi-hint { font-size: 11px; letter-spacing: 1px; color: var(--amber-dim); }
  .wifi-network-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-bottom: 1px solid var(--row-border);
    cursor: pointer; transition: background 0.15s;
  }
  .wifi-network-row:hover { background: rgba(255,179,0,0.05); }
  .wifi-network-row.wifi-active-row { border-left: 3px solid var(--green); padding-left: 7px; }
  .wifi-ssid { flex: 1; font-size: 13px; letter-spacing: 1px; color: var(--amber); }
  .wifi-ssid.wifi-active-ssid { color: var(--green); }
  .wifi-meta { font-size: 11px; color: var(--amber-dim); white-space: nowrap; }
  .wifi-manual-toggle {
    margin-top: 12px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--amber-dim); cursor: pointer; user-select: none;
  }
  .wifi-manual-toggle:hover { color: var(--amber); }
  .wifi-result {
    margin-top: 10px; padding: 8px 12px; font-size: 12px; letter-spacing: 1px;
    border-radius: 2px;
  }
  .wifi-result.ok   { background: rgba(105,240,174,0.07); border: 1px solid rgba(105,240,174,0.25); color: var(--green); }
  .wifi-result.err  { background: rgba(255,61,0,0.07);   border: 1px solid rgba(255,61,0,0.25);   color: var(--red); }
  .wifi-result.info { background: rgba(255,179,0,0.05);  border: 1px solid rgba(255,179,0,0.18);  color: var(--amber); }
  .wifi-switch-warn {
    margin-top: 10px; padding: 10px 14px; font-size: 12px; letter-spacing: 1px; line-height: 1.6;
    background: rgba(255,152,0,0.06); border: 1px solid rgba(255,152,0,0.3); color: #ff9800;
  }
  .btn-wifi-connect {
    background: rgba(255,179,0,0.12); border: 1px solid var(--amber);
    color: var(--amber-bright); font-family: 'VT323', monospace; font-size: 18px;
    letter-spacing: 2px; padding: 5px 16px; cursor: pointer; text-transform: uppercase;
  }
  .btn-wifi-connect:hover { background: rgba(255,179,0,0.22); }
  .btn-eye {
    background: transparent; border: 1px solid var(--amber-dim); color: var(--amber-dim);
    font-size: 14px; padding: 4px 8px; cursor: pointer;
  }
  .btn-eye:hover { border-color: var(--amber); color: var(--amber); }
</style>
</head>
<body>

<div class="board-header">
  <span style="font-size:22px">✈</span>
  <div>
    <div class="board-title">Configuration</div>
    <div class="board-sub">Plane Tracker Settings</div>
  </div>
  <div class="nav-links">
    <a href="/">← Board</a>
    <a href="/stats">Stats</a>
  </div>
</div>

<div class="ticker" id="ticker">Loading configuration...</div>

<div class="content" id="main-content">
  <div class="loading">Loading config...</div>
</div>

<div class="content" style="padding-top:0;padding-bottom:80px">
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">▸ System Status &amp; API Usage</div>
    <div class="section-body single" style="padding:16px">
      <div id="system-status" style="color:var(--amber-dim);font-size:12px;letter-spacing:2px">Loading...</div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-save" id="btn-save" onclick="saveConfig()" disabled>Save &amp; Apply</button>
  <button class="btn btn-reset" onclick="loadConfig()">Reload</button>
  <button class="btn btn-reset" onclick="restartApp()" style="border-color:#ff6b35;color:#ff6b35">Restart App</button>
  <span id="status"></span>
</div>

<script>
let _cfg = {};
let _sec = {};

const _ALL_SOURCES = [
  {id:"AirLabs",     label:"AirLabs",      hint:"Free tier 1,000 calls/month — requires API key"},
  {id:"FlightAware", label:"FlightAware",  hint:"Free $5 credit ~1,000 calls/month — requires API key"},
  {id:"FR24",        label:"FR24",         hint:"Paid — 1 credit per flight, most reliable fallback"},
];

function renderApiSources(order, enabled) {
  const container = document.getElementById('api-sources-list');
  // Show in saved order, then any not in order
  const ordered = [...order];
  _ALL_SOURCES.forEach(s => { if (!ordered.includes(s.id)) ordered.push(s.id); });

  container.innerHTML = ordered.map((sid, i) => {
    const src = _ALL_SOURCES.find(s => s.id === sid) || {id:sid, label:sid, hint:''};
    const isEnabled = enabled[sid] !== false;
    return `
      <div class="key-row" id="src-row-${sid}" data-sid="${sid}" style="align-items:center;gap:10px;padding:6px 8px;border:1px solid var(--amber-dim)">
        <span class="src-num" style="color:var(--amber-bright);font-family:'VT323',monospace;font-size:20px;min-width:16px;text-align:center">${i+1}</span>
        <input type="checkbox" id="src-en-${sid}" ${isEnabled?'checked':''} style="width:auto;accent-color:var(--amber)">
        <div style="flex:1">
          <div style="font-size:13px;letter-spacing:1px">${src.label}</div>
          <div style="font-size:10px;color:var(--amber-dim);letter-spacing:1px">${src.hint}</div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="key-btn" onclick="moveSource('${sid}',-1)" title="Up">↑</button>
          <button class="key-btn" onclick="moveSource('${sid}',1)" title="Down">↓</button>
        </div>
      </div>`;
  }).join('');
}

function moveSource(sid, dir) {
  const rows = [...document.querySelectorAll('[id^="src-row-"]')];
  const idx  = rows.findIndex(r => r.dataset.sid === sid);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= rows.length) return;
  const container = document.getElementById('api-sources-list');
  if (dir === -1) container.insertBefore(rows[idx], rows[newIdx]);
  else            container.insertBefore(rows[newIdx], rows[idx]);
  // Re-number all
  [...document.querySelectorAll('[id^="src-row-"]')].forEach((r, i) => {
    const num = r.querySelector('.src-num');
    if (num) num.textContent = i + 1;
  });
}

function getApiSources() {
  const order = [];
  const enabled = {};
  document.querySelectorAll('[id^="src-row-"]').forEach(row => {
    const sid = row.dataset.sid;
    order.push(sid);
    enabled[sid] = document.getElementById(`src-en-${sid}`)?.checked ?? true;
  });
  return { order, enabled };
}

async function loadConfig() {
  setStatus('', '');
  document.getElementById('btn-save').disabled = true;
  document.getElementById('ticker').textContent = 'Loading configuration...';
  try {
    const r = await fetch('/api/config');
    const d = await r.json();
    _cfg = d.config || {};
    _sec = d.secrets || {};
    renderForm();
    if (window._wifiLoadStatus) window._wifiLoadStatus();
    document.getElementById('ticker').textContent =
      `Config loaded — ${new Date().toLocaleTimeString()}  |  Edit any field and click Save & Apply`;
    document.getElementById('btn-save').disabled = false;
  } catch(e) {
    document.getElementById('ticker').textContent = 'Failed to load config: ' + e.message;
  }
}

function renderForm() {
  const loc  = _cfg.location  || {};
  const disp = _cfg.display   || {};
  const flt  = _cfg.flights   || {};
  const ms   = _cfg.master_slave || {};

  document.getElementById('main-content').innerHTML = `

    <!-- Location & Zone -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">▸ Location &amp; Zone</div>
      <div class="section-body">
        <div class="field">
          <label>Home Airport Code</label>
          <input id="journey_code" value="${loc.journey_code || 'ORD'}" maxlength="4" style="text-transform:uppercase">
          <div class="hint">Your nearest major airport ICAO code</div>
        </div>
        <div class="field">
          <label>Clock Format</label>
          <select id="clock_format">
            <option value="12hr" ${(loc.clock_format||'12hr')==='12hr'?'selected':''}>12hr</option>
            <option value="24hr" ${(loc.clock_format||'')==='24hr'?'selected':''}>24hr</option>
          </select>
        </div>
        <div class="field">
          <label>Temperature Units</label>
          <select id="temperature_units">
            <option value="imperial" ${(loc.temperature_units||'imperial')==='imperial'?'selected':''}>Imperial (°F)</option>
            <option value="metric" ${(loc.temperature_units||'')==='metric'?'selected':''}>Metric (°C)</option>
          </select>
        </div>
        <div class="field">
          <label>Distance Units</label>
          <select id="distance_units">
            <option value="imperial" ${(loc.distance_units||'imperial')==='imperial'?'selected':''}>Imperial (mi)</option>
            <option value="metric" ${(loc.distance_units||'')==='metric'?'selected':''}>Metric (km)</option>
            <option value="nautical" ${(loc.distance_units||'')==='nautical'?'selected':''}>Nautical (nm)</option>
          </select>
        </div>
        <div class="field">
          <label>Speed Units</label>
          <select id="speed_units">
            <option value="imperial" ${(loc.speed_units||'imperial')==='imperial'?'selected':''}>Imperial (mph)</option>
            <option value="metric" ${(loc.speed_units||'')==='metric'?'selected':''}>Metric (km/h)</option>
            <option value="knots" ${(loc.speed_units||'')==='knots'?'selected':''}>Knots (kts)</option>
          </select>
        </div>
        <div></div>
        <div class="field">
          <label>Home Lat, Lon</label>
          <input id="location_home" value="${(loc.location_home||[]).join(', ')}">
          <div class="hint">e.g. 41.882772, -87.623225</div>
        </div>
        <div class="field">
          <label>Temperature Location (Lat, Lon)</label>
          <input id="temperature_location" value="${loc.temperature_location || ''}">
          <div class="hint">Same as home lat,lon usually</div>
        </div>
        <div class="field">
          <label>Top-Left Zone (Lat, Lon)</label>
          <input id="zone_tl" value="${(loc.zone_home||{}).tl_y||''}, ${(loc.zone_home||{}).tl_x||''}" placeholder="41.921086, -87.694973">
        </div>
        <div class="field">
          <label>Bottom-Right Zone (Lat, Lon)</label>
          <input id="zone_br" value="${(loc.zone_home||{}).br_y||''}, ${(loc.zone_home||{}).br_x||''}" placeholder="41.849068, -87.548980">
        </div>
      </div>
    </div>

    <!-- Display -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">▸ Display</div>
      <div class="section-body">
        <div class="field">
          <label>Brightness (day) %</label>
          <input id="brightness" type="number" min="0" max="100" value="${disp.brightness??100}">
        </div>
        <div class="field">
          <label>Brightness (night) %</label>
          <input id="brightness_night" type="number" min="0" max="100" value="${disp.brightness_night??50}">
        </div>
        <div class="field checkbox">
          <input id="night_brightness" type="checkbox" ${disp.night_brightness?'checked':''}>
          <label for="night_brightness">Enable Night Dimming</label>
        </div>
        <div class="field">
          <label>Night Start (HH:MM)</label>
          <input id="night_start" value="${disp.night_start||'22:00'}">
        </div>
        <div class="field">
          <label>Night End (HH:MM)</label>
          <input id="night_end" value="${disp.night_end||'06:00'}">
        </div>
        <div class="field">
          <label>GPIO Slowdown</label>
          <select id="gpio_slowdown">
            <option value="1" ${(disp.gpio_slowdown||2)===1?'selected':''}>1 — Pi Zero / Pi 4</option>
            <option value="2" ${(disp.gpio_slowdown||2)===2?'selected':''}>2 — Pi 3</option>
            <option value="3" ${(disp.gpio_slowdown||2)===3?'selected':''}>3 — Pi 5</option>
          </select>
        </div>
        <div class="field checkbox">
          <input id="hat_pwm_enabled" type="checkbox" ${disp.hat_pwm_enabled?'checked':''}>
          <label for="hat_pwm_enabled">HAT PWM Enabled (soldered bridge)</label>
        </div>
        <div class="field">
          <label>LED RGB Order</label>
          <select id="led_rgb_sequence">
            <option value="RGB" ${(disp.led_rgb_sequence||'RGB')==='RGB'?'selected':''}>RGB (most panels)</option>
            <option value="RBG" ${(disp.led_rgb_sequence||'')==='RBG'?'selected':''}>RBG (some panels)</option>
            <option value="GRB" ${(disp.led_rgb_sequence||'')==='GRB'?'selected':''}>GRB</option>
            <option value="GBR" ${(disp.led_rgb_sequence||'')==='GBR'?'selected':''}>GBR</option>
            <option value="BRG" ${(disp.led_rgb_sequence||'')==='BRG'?'selected':''}>BRG</option>
            <option value="BGR" ${(disp.led_rgb_sequence||'')==='BGR'?'selected':''}>BGR</option>
          </select>
          <div class="hint">Change if colours look wrong — requires app restart</div>
        </div>
        <div class="field">
          <label>Forecast Days</label>
          <input id="forecast_days" type="number" min="1" max="5" value="${disp.forecast_days??3}">
        </div>
        <div class="field">
          <label>Forecast Mode</label>
          <select id="forecast_mode">
            <option value="daily"     ${(disp.forecast_mode||'daily')==='daily'    ?'selected':''}>3-Day (daily)</option>
            <option value="hourly"    ${(disp.forecast_mode||'daily')==='hourly'   ?'selected':''}>Time of Day (hourly)</option>
            <option value="scheduled" ${(disp.forecast_mode||'daily')==='scheduled'?'selected':''}>Hourly in window, else 3-Day</option>
          </select>
        </div>
        <div class="field">
          <label>Hourly Window Start (HH:MM)</label>
          <input id="forecast_hourly_start" value="${disp.forecast_hourly_start||'05:00'}">
        </div>
        <div class="field">
          <label>Hourly Window End (HH:MM)</label>
          <input id="forecast_hourly_end" value="${disp.forecast_hourly_end||'09:00'}">
        </div>
      </div>
    </div>

    <!-- Flights -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">▸ Flights</div>
      <div class="section-body">
        <div class="field">
          <label>Min Altitude (ft)</label>
          <input id="min_altitude" type="number" value="${flt.min_altitude??2600}">
          <div class="hint">Filter out low GA traffic</div>
        </div>
        <div class="field">
          <label>Max Farthest Flights</label>
          <input id="max_farthest" type="number" min="1" max="10" value="${flt.max_farthest??3}">
        </div>
        <div class="field">
          <label>Max Closest Flights</label>
          <input id="max_closest" type="number" min="1" max="10" value="${flt.max_closest??3}">
        </div>
        <div class="field">
          <label>Alert Email</label>
          <input id="email" type="email" value="${flt.email||''}">
          <div class="hint">Leave blank to disable email alerts</div>
        </div>
        <div class="field">
          <label>Blocked Callsigns</label>
          <input id="blocked_callsigns" value="${(flt.blocked_callsigns||[]).join(', ')}" placeholder="N12345, UAL1234, …" spellcheck="false" autocomplete="off" style="text-transform:uppercase">
          <div class="hint">Comma-separated. Matching planes are ignored before any API lookup.</div>
        </div>
        <div class="field">
          <label>Airport Status Watch List</label>
          <input id="airport_status_list" value="${flt.airport_status_list||''}" placeholder="ORD, MDW, LAX, …" spellcheck="false" autocomplete="off" style="text-transform:uppercase">
          <div class="hint">Comma-separated IATA codes. FAA delay/ground stop alerts shown on clock. Leave blank to disable.</div>
        </div>
        <div class="field checkbox">
          <input id="weather_alerts_enabled" type="checkbox" ${flt.weather_alerts_enabled!==false?'checked':''}>
          <label for="weather_alerts_enabled">Enable NWS Weather Alerts (US only, no key required)</label>
        </div>
        <div class="field checkbox">
          <input id="iss_alerts_enabled" type="checkbox" ${flt.iss_alerts_enabled!==false?'checked':''}>
          <label for="iss_alerts_enabled">Enable ISS Pass Alerts (no key required)</label>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">▸ Stats Logging</div>
      <div class="section-body">
        <div class="field">
          <label>Flight Log Retention (days)</label>
          <input id="stats_log_days" type="number" min="0" value="${(_cfg.stats||{}).stats_log_days||''}">
          <div class="hint">Days of flight history to keep. Leave blank to keep forever.</div>
        </div>
      </div>
    </div>

function renderKeysList(name, keys) {
  return keys.map((k, i) => `
    <div class="key-row" id="${name}-key-${i}">
      <input id="${name}_key_${i}" value="${k}" placeholder="Key ${i+1}">
      <button class="key-btn" onclick="removeKey('${name}', ${i})" title="Remove">−</button>
    </div>
  `).join('') + `<button class="key-btn" onclick="addKey('${name}')" style="margin-top:4px;width:100%">+ Add Key</button>`;
}

function addKey(name) {
  const container = document.getElementById(`${name}-keys`);
  const rows = container.querySelectorAll('.key-row');
  const i = rows.length;
  const div = document.createElement('div');
  div.className = 'key-row';
  div.id = `${name}-key-${i}`;
  div.innerHTML = `<input id="${name}_key_${i}" value="" placeholder="Key ${i+1}"><button class="key-btn" onclick="removeKey('${name}', ${i})" title="Remove">−</button>`;
  container.insertBefore(div, container.lastElementChild);
}

function removeKey(name, i) {
  const row = document.getElementById(`${name}-key-${i}`);
  if (row) row.remove();
}

function getKeys(name) {
  const keys = [];
  document.querySelectorAll(`[id^="${name}_key_"]`).forEach(el => {
    if (el.value.trim()) keys.push(el.value.trim());
  });
  return keys;
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const isHidden = body.style.display === 'none';
  body.style.display = isHidden ? '' : 'none';
  header.textContent = header.textContent.replace(isHidden ? '▹' : '▸', isHidden ? '▸' : '▹');
}

function g(id) { return document.getElementById(id); }
function gv(id) { return g(id)?.value ?? ''; }
function gc(id) { return g(id)?.checked ?? false; }
function gi(id) { return parseInt(gv(id)) || 0; }
function gf(id) { return parseFloat(gv(id)) || 0; }

function collectConfig() {
  const homeParts = gv('location_home').split(',').map(s => parseFloat(s.trim()));
  const tlParts   = gv('zone_tl').split(',').map(s => parseFloat(s.trim()));
  const brParts   = gv('zone_br').split(',').map(s => parseFloat(s.trim()));

  return {
    config: {
      location: {
        journey_code:         gv('journey_code').toUpperCase(),
        clock_format:         gv('clock_format'),
        temperature_units:    gv('temperature_units'),
        distance_units:       gv('distance_units'),
        speed_units:          gv('speed_units'),
        location_home:        homeParts,
        temperature_location: gv('temperature_location'),
        journey_blank_filler: ' ? ',
        zone_home: {
          tl_y: tlParts[0] || 0,
          tl_x: tlParts[1] || 0,
          br_y: brParts[0] || 0,
          br_x: brParts[1] || 0,
        },
      },
      display: {
        brightness:        gi('brightness'),
        brightness_night:  gi('brightness_night'),
        night_brightness:  gc('night_brightness'),
        night_start:       gv('night_start'),
        night_end:         gv('night_end'),
        gpio_slowdown:     gi('gpio_slowdown'),
        hat_pwm_enabled:   gc('hat_pwm_enabled'),
        led_rgb_sequence:  gv('led_rgb_sequence'),
        forecast_days:          gi('forecast_days'),
        forecast_mode:          gv('forecast_mode'),
        forecast_hourly_start:  gv('forecast_hourly_start'),
        forecast_hourly_end:    gv('forecast_hourly_end'),
      },
      flights: {
        min_altitude: gi('min_altitude'),
        max_farthest: gi('max_farthest'),
        max_closest:        gi('max_closest'),
        email:              gv('email'),
        blocked_callsigns:      gv('blocked_callsigns').split(',').map(s=>s.trim().toUpperCase()).filter(Boolean),
        airport_status_list:    gv('airport_status_list').split(',').map(s=>s.trim().toUpperCase()).filter(Boolean).join(', '),
        weather_alerts_enabled: gc('weather_alerts_enabled'),
        iss_alerts_enabled:     gc('iss_alerts_enabled'),
      },
        stats: {
        stats_log_days: gi('stats_log_days') || 0,
      },
      master_slave: {
        master_tracker:          gv('master_tracker'),
        other_tracker_hostnames: gv('other_tracker_hostnames').split(',').map(s=>s.trim()).filter(Boolean),
      },
      api_sources: (() => {
        const a = getApiSources();
        return {
            order: a.order, enabled: a.enabled,
            airlabs_reset_day:     gi('airlabs_reset_day')     || 1,
            flightaware_reset_day: gi('flightaware_reset_day') || 1,
            fr24_reset_day:        gi('fr24_reset_day')        || 1,
          };
      })(),
    },
    secrets: {
      tomorrow_api_key:          gv('tomorrow_api_key'),
      opensky_client_id:         gv('opensky_client_id'),
      opensky_client_secret:     gv('opensky_client_secret'),
      airlabs_api_keys:          getKeys('airlabs'),
      flightaware_api_keys:      getKeys('flightaware'),
      flightaware_monthly_limit: gf('flightaware_monthly_limit'),
      flightradar24_key:         gv('flightradar24_key'),
    }
  };
}

async function saveConfig() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  setStatus('', '');

  try {
    const payload = collectConfig();
    const r = await fetch('/api/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (d.ok) {
      setStatus('✓ Config saved and applied', 'ok');
      document.getElementById('ticker').textContent =
        `Saved — ${new Date().toLocaleTimeString()}  |  Changes are live immediately`;
      // Reload to show updated masked values
      setTimeout(loadConfig, 1000);
    } else {
      setStatus('✗ ' + (d.errors||[]).join(', '), 'err');
    }
  } catch(e) {
    setStatus('✗ ' + e.message, 'err');
  }

  btn.textContent = 'Save & Apply';
  btn.disabled = false;
}

async function restartApp() {
  if (!confirm('Restart the app? Display will go dark for a few seconds.')) return;
  setStatus('Restarting...', '');
  try {
    await fetch('/api/restart', {method: 'POST'});
    setStatus('✓ Restarting — reconnecting in 8s...', 'ok');
    setTimeout(() => window.location.reload(), 8000);
  } catch(e) {
    setStatus('✗ ' + e.message, 'err');
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

// ── WiFi ──────────────────────────────────────────────────────────────────
(function () {
  'use strict';
  let _currentSsid  = null;
  let _pendingSsid  = null;
  let _pendingPw    = null;
  let _manualOpen   = false;

  function signalBars(pct) {
    if (pct >= 80) return '▂▄▆█';
    if (pct >= 55) return '▂▄▆·';
    if (pct >= 30) return '▂▄··';
    if (pct >= 10) return '▂···';
    return '····';
  }

  function showWifiResult(msg, type) {
    const el = document.getElementById('wifi-result');
    el.textContent = msg;
    el.className   = 'wifi-result ' + type;
    el.style.display = 'block';
  }

  async function wifiLoadStatus() {
    try {
      const d = await fetch('/api/wifi/status').then(r => r.json());
      if (d.error) throw new Error(d.error);
      _currentSsid = d.connected_ssid || null;

      const ssidEl = document.getElementById('wifi-ssid');
      const ipEl   = document.getElementById('wifi-ip');
      const sigEl  = document.getElementById('wifi-signal');
      const stEl   = document.getElementById('wifi-conn-status');

      if (_currentSsid) {
        ssidEl.textContent = _currentSsid;
        ssidEl.className   = 'wifi-stat-value connected';
        stEl.textContent   = 'CONNECTED';
        stEl.className     = 'wifi-stat-value connected';
        const cur = (d.networks || []).find(n => n.active);
        sigEl.textContent  = cur ? signalBars(cur.signal) + ' ' + cur.signal + '%' : '—';
      } else {
        ssidEl.textContent = 'NOT CONNECTED';
        ssidEl.className   = 'wifi-stat-value disconnected';
        stEl.textContent   = 'DISCONNECTED';
        stEl.className     = 'wifi-stat-value disconnected';
        sigEl.textContent  = '—';
      }
      ipEl.textContent = d.ip_address || '—';
    } catch(e) {
      const el = document.getElementById('wifi-conn-status');
      if (el) el.textContent = 'ERROR';
    }
  }

  window.wifiScan = async function () {
    const btn  = document.getElementById('wifi-scan-btn');
    const hint = document.getElementById('wifi-scan-hint');
    btn.disabled    = true;
    btn.textContent = '⟳  Scanning…';
    hint.textContent = '';
    document.getElementById('wifi-network-list').style.display = 'none';
    try {
      const d = await fetch('/api/wifi/scan').then(r => r.json());
      if (d.error) throw new Error(d.error);
      renderNetworkList(d.networks || []);
      hint.textContent = (d.networks || []).length + ' networks found';
    } catch(e) {
      hint.textContent = 'Scan failed: ' + e.message;
    } finally {
      btn.disabled    = false;
      btn.textContent = '⟳  Scan for Networks';
    }
  };

  function renderNetworkList(networks) {
    const container = document.getElementById('wifi-network-list');
    container.innerHTML = '';
    if (!networks.length) {
      container.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:var(--amber-dim)">No networks found</div>';
      container.style.display = 'block';
      return;
    }
    networks.forEach(net => {
      const row  = document.createElement('div');
      row.className = 'wifi-network-row' + (net.active ? ' wifi-active-row' : '');
      const lock = (net.security && net.security !== '--') ? '🔒' : '🔓';
      row.innerHTML = `
        <span style="font-family:'VT323',monospace;font-size:18px;letter-spacing:-2px">${signalBars(net.signal)}</span>
        <span class="wifi-ssid${net.active ? ' wifi-active-ssid' : ''}">${net.ssid}${net.active ? ' ✓' : ''}</span>
        <span class="wifi-meta">${lock} ${net.signal}%</span>
      `;
      if (!net.active) row.addEventListener('click', () => wifiSelectNetwork(net));
      container.appendChild(row);
    });
    container.style.display = 'block';
  }

  function wifiSelectNetwork(net) {
    _pendingSsid = net.ssid;
    _pendingPw   = null;
    document.getElementById('wifi-result').style.display      = 'none';
    document.getElementById('wifi-switch-warn').style.display = 'none';
    const needsPw = net.security && net.security !== '--';
    if (needsPw) {
      document.getElementById('wifi-manual-ssid').value     = net.ssid;
      document.getElementById('wifi-manual-password').value = '';
      if (!_manualOpen) wifiToggleManual();
      document.getElementById('wifi-manual-password').focus();
      showWifiResult('Selected: ' + net.ssid + ' — enter password below and click Connect', 'info');
      return;
    }
    if (net.ssid !== _currentSsid) {
      document.getElementById('wifi-switch-warn').style.display = 'block';
      return;
    }
    wifiDoConnect(net.ssid, '');
  }

  window.wifiConnectManual = function () {
    const ssid = document.getElementById('wifi-manual-ssid').value.trim();
    const pw   = document.getElementById('wifi-manual-password').value;
    if (!ssid) { showWifiResult('Please enter an SSID.', 'err'); return; }
    _pendingSsid = ssid;
    _pendingPw   = pw;
    if (ssid !== _currentSsid) {
      document.getElementById('wifi-switch-warn').style.display = 'block';
      return;
    }
    wifiDoConnect(ssid, pw);
  };

  window.wifiConfirmSwitch = function () {
    document.getElementById('wifi-switch-warn').style.display = 'none';
    const pw = _pendingPw !== null
      ? _pendingPw
      : document.getElementById('wifi-manual-password').value;
    wifiDoConnect(_pendingSsid, pw);
  };

  window.wifiCancelSwitch = function () {
    document.getElementById('wifi-switch-warn').style.display = 'none';
    _pendingSsid = _pendingPw = null;
  };

  async function wifiDoConnect(ssid, password) {
    showWifiResult('Connecting to ' + ssid + '…', 'info');
    const confirmBtn = document.getElementById('wifi-confirm-btn');
    if (confirmBtn) confirmBtn.disabled = true;
    try {
      const d = await fetch('/api/wifi/connect', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ssid, password}),
      }).then(r => r.json());
      if (d.switched) {
        showWifiResult('✓ Connecting — Pi may have switched networks. Reconnect and find the Pi at its new IP.', 'info');
        return;
      }
      if (d.success) {
        showWifiResult('✓ Connected to ' + ssid, 'ok');
        wifiLoadStatus();
      } else {
        showWifiResult('✗ ' + (d.error || 'Connection failed'), 'err');
      }
    } catch(e) {
      showWifiResult('✓ Connection in progress — page may be offline because the Pi switched networks.', 'info');
    } finally {
      if (confirmBtn) confirmBtn.disabled = false;
      _pendingSsid = _pendingPw = null;
    }
  }

  window.wifiToggleManual = function () {
    _manualOpen = !_manualOpen;
    document.getElementById('wifi-manual-section').style.display = _manualOpen ? 'block' : 'none';
    document.getElementById('wifi-manual-arrow').textContent     = _manualOpen ? '▾' : '▸';
  };

  window.wifiTogglePw = function (id) {
    const el = document.getElementById(id);
    el.type  = el.type === 'password' ? 'text' : 'password';
  };

  window._wifiLoadStatus = wifiLoadStatus;
})();

loadConfig();
loadSystemStatus();

async function loadSystemStatus() {
  try {
    const [sys, usage] = await Promise.all([
      fetch('/api/system').then(r=>r.json()),
      fetch('/api/usage').then(r=>r.json()),
    ]);

    function fmt_dur(secs) {
      if (!secs) return '—';
      const d = Math.floor(secs / 86400);
      const h = Math.floor((secs % 86400) / 3600);
      const m = Math.floor((secs % 3600) / 60);
      return d > 0 ? `${d}d ${h}h ${m}m` : h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    const tempC = sys.cpu_temp_c;
    const tempF = tempC != null ? (tempC * 9/5 + 32).toFixed(1) : null;
    const tempStr = tempC != null ? `${tempC}°C / ${tempF}°F` : '—';
    const tempWarn = tempC != null && tempC >= 70;

    const al     = usage.AirLabs        ?? 0;
    const fa     = usage.FlightAware     ?? 0;
    const fr     = usage.FR24            ?? 0;
    const al_mon = (usage.AirLabs_period_start     || usage.month || '').slice(0, 7);
    const fa_mon = (usage.FlightAware_period_start || usage.month || '').slice(0, 7);
    const fr_mon = (usage.FR24_period_start        || usage.month || '').slice(0, 7);

    document.getElementById('system-status').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px">

        <div style="border:1px solid var(--amber-dim);border-top:2px solid var(--amber);padding:10px 12px">
          <div style="font-size:10px;letter-spacing:2px;color:var(--amber-dim);margin-bottom:4px">PI UPTIME</div>
          <div style="font-family:'VT323',monospace;font-size:24px;color:var(--amber-bright)">${fmt_dur(sys.uptime_secs)}</div>
        </div>

        <div style="border:1px solid var(--amber-dim);border-top:2px solid var(--amber);padding:10px 12px">
          <div style="font-size:10px;letter-spacing:2px;color:var(--amber-dim);margin-bottom:4px">SERVICE UPTIME</div>
          <div style="font-family:'VT323',monospace;font-size:24px;color:var(--amber-bright)">${fmt_dur(sys.service_uptime_secs)}</div>
        </div>

        <div style="border:1px solid var(--amber-dim);border-top:2px solid ${tempWarn?'var(--red)':'var(--amber)'};padding:10px 12px">
          <div style="font-size:10px;letter-spacing:2px;color:var(--amber-dim);margin-bottom:4px">CPU TEMP</div>
          <div style="font-family:'VT323',monospace;font-size:24px;color:${tempWarn?'var(--red)':'var(--amber-bright)'}">${tempStr}${tempWarn?' ⚠':''}</div>
        </div>

        <div style="border:1px solid var(--amber-dim);border-top:2px solid ${al>=900?'var(--red)':'var(--amber)'};padding:10px 12px">
          <div style="font-size:10px;letter-spacing:2px;color:var(--amber-dim);margin-bottom:4px">AIRLABS ${al_mon}</div>
          <div style="font-family:'VT323',monospace;font-size:24px;color:${al>=900?'var(--red)':'var(--amber-bright)'}">${al}<span style="font-size:13px;color:var(--amber-dim)">/1,000${al>=900?' ⚠':''}</span></div>
        </div>

        <div style="border:1px solid var(--amber-dim);border-top:2px solid ${fa>=4.5?'var(--red)':'var(--amber)'};padding:10px 12px">
          <div style="font-size:10px;letter-spacing:2px;color:var(--amber-dim);margin-bottom:4px">FLIGHTAWARE ${fa_mon}</div>
          <div style="font-family:'VT323',monospace;font-size:24px;color:${fa>=4.5?'var(--red)':'var(--amber-bright)'}">$${fa.toFixed(2)}<span style="font-size:13px;color:var(--amber-dim)">/$5.00${fa>=4.5?' ⚠':''}</span></div>
        </div>

        <div style="border:1px solid var(--amber-dim);border-top:2px solid var(--amber);padding:10px 12px">
          <div style="font-size:10px;letter-spacing:2px;color:var(--amber-dim);margin-bottom:4px">FR24 ${fr_mon}</div>
          <div style="font-family:'VT323',monospace;font-size:24px;color:var(--amber-bright)">${fr}<span style="font-size:13px;color:var(--amber-dim)"> credits</span></div>
        </div>

        <div style="border:1px solid var(--amber-dim);border-top:2px solid var(--amber);padding:10px 12px">
          <div style="font-size:10px;letter-spacing:2px;color:var(--amber-dim);margin-bottom:4px">LOAD AVG</div>
          <div style="font-family:'VT323',monospace;font-size:24px;color:var(--amber-bright)">
            ${sys.load_avg ? sys.load_avg.map(v=>v.toFixed(2)).join(' / ') : '—'}
          </div>
          <div style="font-size:10px;color:var(--amber-dim);margin-top:2px">1 min / 5 min / 15 min</div>
        </div>

      </div>
    `;
  } catch(e) {
    document.getElementById('system-status').textContent = 'Could not load system status.';
  }
}
</script>
</body>
</html>
