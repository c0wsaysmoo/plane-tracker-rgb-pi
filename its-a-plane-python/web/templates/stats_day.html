<!DOCTYPE html>
<html>
<head>
    <title>Daily Stats</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; max-width: 900px; margin: 0 auto; }
        a.back { font-size: 14px; color: #0066cc; text-decoration: none; margin-right: 16px; }
        h1 { margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 15px; margin-bottom: 14px; }
        .cards { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
        .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 120px; }
        .card .label { font-size: 12px; color: #888; text-transform: uppercase; }
        .card .value { font-size: 22px; font-weight: bold; margin-top: 2px; }
        .card .sub { font-size: 12px; color: #666; }
        .chart-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0; }
        .chart-box { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 14px; flex: 1; min-width: 280px; }
        .chart-box h3 { margin: 0 0 10px 0; font-size: 14px; color: #555; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        th { color: #888; font-size: 11px; text-transform: uppercase; }
        .scroll-table { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div>
        <a class="back" href="/stats">← Stats</a>
        <a class="back" href="/">← Dashboard</a>
    </div>
    <h1 id="page-title">—</h1>
    <div class="subtitle" id="page-sub"></div>

    <div class="cards">
        <div class="card"><div class="label">Total Flights</div><div class="value" id="total">—</div></div>
        <div class="card"><div class="label">Peak Hour</div><div class="value" id="peak-hour">—</div><div class="sub" id="peak-sub"></div></div>
        <div class="card"><div class="label">First Seen</div><div class="value" id="first-val">—</div><div class="sub" id="first-sub"></div></div>
        <div class="card"><div class="label">Last Seen</div><div class="value" id="last-val">—</div><div class="sub" id="last-sub"></div></div>
    </div>

    <div class="chart-row">
        <div class="chart-box" style="flex:2;">
            <h3>Flights by Hour</h3>
            <canvas id="hourChart"></canvas>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-box">
            <h3>Airline Breakdown</h3>
            <canvas id="airlineChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Local vs Flyover</h3>
            <canvas id="localChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>All Flights</h3>
            <div class="scroll-table">
                <table>
                    <thead><tr><th>#</th><th>Callsign</th><th>Route</th><th>Time</th></tr></thead>
                    <tbody id="flights-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const COLOURS = ['#ffb300','#ff6b35','#69f0ae','#ffd54f','#ff69b4','#9b59b6','#1abc9c','#e74c3c','#3498db','#f39c12','#00b894','#fd79a8'];
        const DOWS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const date = window.location.pathname.split('/').pop();

        async function loadDay() {
            const [fullRes, locRes] = await Promise.all([
                fetch('/counter'), fetch('/airport-code')
            ]);
            const full = await fullRes.json();
            const loc = await locRes.json();
            const airportCode = (loc.code || '').toUpperCase();

            const day = full[date];
            if (!day) {
                document.getElementById('page-title').textContent = `No data for ${date}`;
                return;
            }

            const dateObj = new Date(date + 'T12:00:00');
            const dayOfWeek = isNaN(dateObj.getTime()) ? '' : DOWS[dateObj.getDay()];
            document.getElementById('page-title').textContent = date;
            document.getElementById('page-sub').textContent = dayOfWeek;

            const flights = day.flights || [];
            document.getElementById('total').textContent = flights.length;

            // By hour
            const byHour = Array(24).fill(0);
            flights.forEach(f => byHour[f.hour || 0]++);
            const peakHour = byHour.indexOf(Math.max(...byHour));
            document.getElementById('peak-hour').textContent = `${peakHour}:00`;
            document.getElementById('peak-sub').textContent = `${byHour[peakHour]} flights`;

            // First/last
            if (flights.length) {
                document.getElementById('first-val').textContent = day.first_seen || flights[0].time;
                document.getElementById('first-sub').textContent = flights[0].callsign;
                document.getElementById('last-val').textContent = day.last_seen || flights[flights.length-1].time;
                document.getElementById('last-sub').textContent = flights[flights.length-1].callsign;
            }

            // Airline breakdown
            const airlines = {};
            flights.forEach(f => {
                const p = f.callsign.replace(/[0-9]/g,'').slice(0,3);
                if (p) airlines[p] = (airlines[p] || 0) + 1;
            });
            const sorted = Object.entries(airlines).sort((a,b) => b[1] - a[1]).slice(0, 12);

            // Local vs flyover
            let local = 0, flyover = 0, unknown = 0;
            flights.forEach(f => {
                const o = (f.origin || '').toUpperCase();
                const d = (f.dest || '').toUpperCase();
                if (!o && !d) unknown++;
                else if (o === airportCode || d === airportCode) local++;
                else flyover++;
            });

            // Hourly chart
            const chartOpt = {
                responsive: true, maintainAspectRatio: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 } } },
                    y: { grid: { color: 'rgba(0,0,0,0.05)' }, beginAtZero: true }
                }
            };

            new Chart(document.getElementById('hourChart'), {
                type: 'bar',
                data: {
                    labels: Array.from({length:24}, (_,i) => `${i}:00`),
                    datasets: [{
                        data: byHour,
                        backgroundColor: byHour.map((_,i) => i === peakHour ? 'rgba(255,107,53,0.4)' : 'rgba(255,179,0,0.2)'),
                        borderColor: byHour.map((_,i) => i === peakHour ? '#ff6b35' : '#ffb300'),
                        borderWidth: 1
                    }]
                },
                options: chartOpt
            });

            new Chart(document.getElementById('airlineChart'), {
                type: 'doughnut',
                data: {
                    labels: sorted.map(s => s[0]),
                    datasets: [{ data: sorted.map(s => s[1]), backgroundColor: COLOURS.map(c => c + '99'), borderColor: COLOURS, borderWidth: 1 }]
                },
                options: { responsive: true, cutout: '60%', plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } } }
            });

            new Chart(document.getElementById('localChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Local', 'Flyover', 'Unknown'],
                    datasets: [{ data: [local, flyover, unknown], backgroundColor: ['#69f0ae99','#ffb30099','#cccccc99'], borderColor: ['#69f0ae','#ffb300','#ccc'], borderWidth: 1 }]
                },
                options: { responsive: true, cutout: '60%', plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } } }
            });

            // Flights table
            const tbody = document.getElementById('flights-body');
            flights.forEach((f, i) => {
                const route = (f.origin && f.dest) ? `${f.origin}\u2192${f.dest}` : (f.origin || f.dest || '\u2014');
                const tr = document.createElement('tr');
                [i+1, f.callsign, route, f.time].forEach(val => {
                    const td = document.createElement('td');
                    td.textContent = val;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        document.addEventListener('DOMContentLoaded', loadDay);
    </script>
</body>
</html>
