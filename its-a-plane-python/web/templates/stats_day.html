<!DOCTYPE html>
<html>
<head>
    <title>Daily Stats</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            padding: 20px;
            background: #0d0d0b;
            color: #ffb000;
            max-width: 960px;
            margin: 0 auto;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 100;
        }
        h1 {
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 28px;
            margin-bottom: 5px;
            color: #ffd54f;
            text-shadow: 0 0 10px rgba(255,180,0,0.3);
        }
        h3 {
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 18px;
            color: #ffb000;
        }
        .subtitle { color: #806000; font-size: 14px; margin-bottom: 14px; }
        .nav { margin-bottom: 16px; font-size: 14px; }
        .nav a { color: #ffb000; text-decoration: none; margin-right: 16px; }
        .nav a:hover { text-decoration: underline; color: #ffd54f; }
        .cards { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
        .card {
            background: #111;
            border: 1px solid #333;
            border-top: 2px solid #ffb000;
            padding: 12px 16px;
            flex: 1;
            min-width: 120px;
        }
        .card .label { font-size: 11px; color: #806000; text-transform: uppercase; }
        .card .value {
            font-family: 'VT323', 'Courier New', monospace;
            font-size: 26px;
            color: #ffd54f;
            margin-top: 2px;
        }
        .card .sub { font-size: 11px; color: #555; }
        .chart-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0; }
        .chart-box {
            background: #111;
            border: 1px solid #333;
            padding: 14px;
            flex: 1;
            min-width: 280px;
        }
        .chart-box h3 { margin: 0 0 10px 0; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #222; font-size: 13px; }
        th { color: #806000; font-size: 11px; text-transform: uppercase; }
        .scroll-table { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/stats">← Stats</a>
        <a href="/">← Dashboard</a>
    </div>
    <h1 id="page-title">—</h1>
    <div class="subtitle" id="page-sub"></div>

    <div class="cards">
        <div class="card"><div class="label">Total Flights</div><div class="value" id="total">—</div></div>
        <div class="card"><div class="label">Peak Hour</div><div class="value" id="peak-hour">—</div><div class="sub" id="peak-sub"></div></div>
        <div class="card"><div class="label">First Seen</div><div class="value" id="first-val">—</div><div class="sub" id="first-sub"></div></div>
        <div class="card"><div class="label">Last Seen</div><div class="value" id="last-val">—</div><div class="sub" id="last-sub"></div></div>
    </div>

    <div class="chart-row">
        <div class="chart-box" style="flex:2;">
            <h3>▸ Flights by Hour</h3>
            <canvas id="hourChart"></canvas>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-box">
            <h3>▸ Airlines</h3>
            <canvas id="airlineChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>▸ Traffic Type</h3>
            <canvas id="localChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>▸ All Flights</h3>
            <div class="scroll-table">
                <table>
                    <thead><tr><th>#</th><th>Callsign</th><th>Route</th><th>Time</th></tr></thead>
                    <tbody id="flights-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const COLOURS = ['#ffb300','#ff6b35','#69f0ae','#ffd54f','#ff69b4','#9b59b6','#1abc9c','#e74c3c','#3498db','#f39c12','#00b894','#fd79a8'];
        const DOWS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const doughnutOpt = { responsive: true, cutout: '60%', plugins: { legend: { position: 'right', labels: { color: '#ffb000', font: { size: 11 } } } } };
        const chartOpt = {
            responsive: true, maintainAspectRatio: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(255,176,0,0.1)' }, ticks: { color: '#806000', font: { size: 10 } } },
                y: { grid: { color: 'rgba(255,176,0,0.1)' }, ticks: { color: '#806000' }, beginAtZero: true }
            }
        };
        const date = window.location.pathname.split('/').pop();

        async function loadDay() {
            const [fullRes, locRes] = await Promise.all([
                fetch('/counter'), fetch('/airport-code')
            ]);
            const full = await fullRes.json();
            const loc = await locRes.json();
            const airportCode = (loc.code || '').toUpperCase();

            const day = full[date];
            if (!day) {
                document.getElementById('page-title').textContent = `No data for ${date}`;
                return;
            }

            const dateObj = new Date(date + 'T12:00:00');
            const dayOfWeek = isNaN(dateObj.getTime()) ? '' : DOWS[dateObj.getDay()];
            document.getElementById('page-title').textContent = date;
            document.getElementById('page-sub').textContent = dayOfWeek;

            const flights = day.flights || [];
            document.getElementById('total').textContent = flights.length;

            // By hour
            const byHour = Array(24).fill(0);
            flights.forEach(f => byHour[f.hour || 0]++);
            const peakHour = byHour.indexOf(Math.max(...byHour));
            document.getElementById('peak-hour').textContent = `${peakHour}:00`;
            document.getElementById('peak-sub').textContent = `${byHour[peakHour]} flights`;

            // First/last
            if (flights.length) {
                document.getElementById('first-val').textContent = day.first_seen || flights[0].time;
                document.getElementById('first-sub').textContent = flights[0].callsign;
                document.getElementById('last-val').textContent = day.last_seen || flights[flights.length-1].time;
                document.getElementById('last-sub').textContent = flights[flights.length-1].callsign;
            }

            // Airline breakdown
            const airlines = {};
            flights.forEach(f => {
                const p = f.callsign.replace(/[0-9]/g,'').slice(0,3);
                if (p) airlines[p] = (airlines[p] || 0) + 1;
            });
            const sorted = Object.entries(airlines).sort((a,b) => b[1] - a[1]).slice(0, 12);

            // 4-way traffic split
            let departing = 0, arriving = 0, flyover = 0, unknown = 0;
            flights.forEach(f => {
                const o = (f.origin || '').toUpperCase();
                const d = (f.dest || '').toUpperCase();
                if (!o && !d) unknown++;
                else if (o === airportCode) departing++;
                else if (d === airportCode) arriving++;
                else flyover++;
            });

            // Resolve airline names
            let airlineNames = {};
            try {
                const res = await fetch('/api/airlines', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({codes: sorted.map(s => s[0])})
                });
                airlineNames = await res.json();
            } catch (e) {}

            // Hourly chart
            new Chart(document.getElementById('hourChart'), {
                type: 'bar',
                data: {
                    labels: Array.from({length:24}, (_,i) => `${i}:00`),
                    datasets: [{
                        data: byHour,
                        backgroundColor: byHour.map((_,i) => i === peakHour ? 'rgba(255,107,53,0.4)' : 'rgba(255,179,0,0.2)'),
                        borderColor: byHour.map((_,i) => i === peakHour ? '#ff6b35' : '#ffb300'),
                        borderWidth: 1
                    }]
                },
                options: chartOpt
            });

            const airlineLabels = sorted.map(s => airlineNames[s[0]] ? `${s[0]} (${airlineNames[s[0]]})` : s[0]);
            new Chart(document.getElementById('airlineChart'), {
                type: 'doughnut',
                data: {
                    labels: airlineLabels,
                    datasets: [{ data: sorted.map(s => s[1]), backgroundColor: COLOURS.map(c => c + '99'), borderColor: COLOURS, borderWidth: 1 }]
                },
                options: doughnutOpt
            });

            new Chart(document.getElementById('localChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Departing', 'Arriving', 'Flyover', 'Unknown'],
                    datasets: [{
                        data: [departing, arriving, flyover, unknown],
                        backgroundColor: ['#69f0ae99','#3498db99','#ffb30099','#55555599'],
                        borderColor: ['#69f0ae','#3498db','#ffb300','#555'],
                        borderWidth: 1
                    }]
                },
                options: doughnutOpt
            });

            // Flights table
            const tbody = document.getElementById('flights-body');
            flights.forEach((f, i) => {
                const route = (f.origin && f.dest) ? `${f.origin}\u2192${f.dest}` : (f.origin || f.dest || '\u2014');
                const tr = document.createElement('tr');
                [i+1, f.callsign, route, f.time].forEach(val => {
                    const td = document.createElement('td');
                    td.textContent = val;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        document.addEventListener('DOMContentLoaded', loadDay);
    </script>
</body>
</html>
