<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Stats</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
  :root {
    --bg: #0d0d0b; --amber: #ffb300; --amber-dim: #7a5500;
    --amber-glow: rgba(255,179,0,0.08); --amber-bright: #ffd54f;
    --green: #69f0ae; --red: #ff3d00; --orange: #ff9800;
    --row-border: rgba(255,179,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--amber);
    font-family: 'Share Tech Mono', monospace; min-height: 100vh; padding-bottom: 24px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 1000;
  }
  .board-header {
    background: var(--amber); color: var(--bg);
    padding: 10px 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .board-title { font-family: 'VT323', monospace; font-size: 28px; letter-spacing: 4px; text-transform: uppercase; }
  .board-sub { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6; margin-left: 4px; }
  .back { font-family: 'VT323', monospace; font-size: 20px; letter-spacing: 2px; margin-left: auto;
          background: var(--bg); color: var(--amber); padding: 2px 12px; text-decoration: none; }

  .content { padding: 0 16px; }

  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px; margin-bottom: 16px;
  }
  .stat-card {
    border: 1px solid var(--amber-dim); border-top: 2px solid var(--amber);
    padding: 12px 14px; background: rgba(255,179,0,0.03);
  }
  .stat-label { font-family: 'VT323', monospace; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; color: var(--amber-bright); margin-bottom: 4px; }
  .stat-value { font-family: 'VT323', monospace; font-size: 32px; color: var(--amber-bright); line-height: 1; }
  .stat-sub { font-size: 13px; color: var(--amber); margin-top: 2px; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .chart-full { grid-column: 1 / -1; }

  .panel {
    border: 1px solid var(--amber-dim); padding: 16px;
    background: rgba(255,179,0,0.02); min-width: 0;
  }
  .panel-title {
    font-family: 'VT323', monospace;
    font-size: 22px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--amber-bright); margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--amber-dim);
  }
  canvas { max-height: 200px; max-width: 100%; }

  .day-table { width: 100%; border-collapse: collapse; font-family: 'VT323', monospace; font-size: 20px; table-layout: fixed; }
  .day-table .bar-col { width: 70px; overflow: hidden; padding-right: 4px; }
  .day-table th {
    text-align: left; padding: 5px 10px; color: var(--amber-bright);
    font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    border-bottom: 1px solid var(--amber-dim); font-family: 'VT323', monospace;
  }
  .day-table td { padding: 6px 10px; border-bottom: 1px solid var(--row-border); }
  .day-table tr:hover td { background: var(--amber-glow); cursor: pointer; }
  .day-table tr:last-child td { border-bottom: none; }
  .num { color: var(--amber-bright); }
  .dim { color: var(--amber-dim); font-size: 16px; }
  .bar-inline {
    display: inline-block; height: 6px;
    background: linear-gradient(90deg, var(--amber), rgba(255,179,0,0.3));
    vertical-align: middle; margin-left: 8px;
  }

  .loading {
    text-align: center; padding: 60px; color: var(--amber-dim);
    font-family: 'VT323', monospace; font-size: 24px; letter-spacing: 3px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  @media (max-width: 600px) {
    .charts-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .bar-inline { max-width: 60px; }
  }
  .route-map-wrap { height: 340px; position: relative; }
  .route-map-wrap .leaflet-container { background: #0a0a08; }
  .route-tip { background: #1a1a15 !important; border: 1px solid var(--amber-dim) !important; color: var(--amber) !important; font-family: 'Share Tech Mono', monospace !important; font-size: 12px !important; padding: 4px 8px !important; box-shadow: none !important; }
  .route-tip::before { display: none !important; }
</style>
</head>
<body>
<div class="board-header">
  <span style="font-size:22px">✈</span>
  <div class="board-title">Flight Stats<span class="board-sub"> / Overhead Analysis</span></div>
  <a class="back" href="/">← BOARD</a>
</div>

<div class="content">
  <div id="content"><div class="loading">Loading flight data...</div></div>
</div>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let AIRLINE_NAMES = {};
let AIRCRAFT_NAMES = {};
const COLOURS = ['#ffb300','#ff6b35','#69f0ae','#ffd54f','#ff69b4','#9b59b6','#1abc9c','#e74c3c','#3498db','#f39c12','#00b894','#fd79a8'];

const CHART_OPT = {
  responsive:true, maintainAspectRatio:true,
  plugins:{legend:{display:false}},
  scales:{
    x:{grid:{color:'rgba(122,85,0,0.4)'},ticks:{color:'#7a5500',font:{family:'Share Tech Mono',size:10}}},
    y:{grid:{color:'rgba(122,85,0,0.4)'},ticks:{color:'#7a5500',font:{family:'Share Tech Mono',size:10}},beginAtZero:true}
  }
};

async function loadData() {
  const [s,f,a,cfg,an,at] = await Promise.all([
    fetch('/counter/summary').then(r=>r.json()),
    fetch('/counter').then(r=>r.json()),
    fetch('/airport-code').then(r=>r.json()),
    fetch('/api/config').then(r=>r.json()).catch(()=>({})),
    fetch('/api/airlines').then(r=>r.json()).catch(()=>({})),
    fetch('/api/aircraft-types').then(r=>r.json()).catch(()=>({})),
  ]);
  AIRLINE_NAMES = an;
  AIRCRAFT_NAMES = at;
  const distUnits = (cfg.config?.location?.distance_units) || 'imperial';
  const homeCoords = cfg.config?.location?.location_home || [];
  const homeLat = homeCoords[0] ?? null;
  const homeLon = homeCoords[1] ?? null;
  const zone = cfg.config?.location?.zone_home || null;
  return {summary:s, full:f, airportCode:a.code, distUnits, homeLat, homeLon, zone};
}

function haversineDist(lat1, lon1, lat2, lon2, units) {
  const R = units === 'nautical' ? 3440.065 : units === 'metric' ? 6371 : 3958.8;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function distLabel(dist, units) {
  const d = Math.round(dist);
  if (units === 'nautical') return `${d}nm`;
  if (units === 'metric')   return `${d}km`;
  return `${d}mi`;
}

function localVsFlyover(full, airportCode) {
  let departing = 0, arriving = 0, flyover = 0, unknown = 0;
  Object.values(full).forEach(day => (day.flights||[]).forEach(f => {
    const origin = (f.origin || '').toUpperCase();
    const dest   = (f.dest   || '').toUpperCase();
    const code   = airportCode.toUpperCase();
    const hasUnknown = origin.includes('?') || dest.includes('?');
    if (hasUnknown)          { unknown++;   }
    else if (!origin && !dest) { unknown++;   }
    else if (origin === code)  { departing++; }
    else if (dest === code)    { arriving++;  }
    else                       { flyover++;   }
  }));
  return {departing, arriving, flyover, unknown};
}

function avgByHour(days) {
  const t=new Array(24).fill(0);
  days.forEach(d=>d.by_hour.forEach((v,i)=>t[i]+=v));
  return t.map(v=>days.length?+(v/days.length).toFixed(1):0);
}

function avgByDow(days) {
  const t=new Array(7).fill(0),c=new Array(7).fill(0);
  days.forEach(d=>{const dow=new Date(d.date+'T12:00:00').getDay();t[dow]+=d.count;c[dow]++;});
  return t.map((v,i)=>c[i]?+(v/c[i]).toFixed(1):0);
}

function airlineBreakdown(full) {
  const tally={};
  Object.values(full).forEach(day=>(day.flights||[]).forEach(f=>{
    const p=f.callsign.replace(/[0-9]/g,'').slice(0,3);
    tally[p]=(tally[p]||0)+1;
  }));
  return Object.entries(tally).sort((a,b)=>b[1]-a[1]).slice(0,12);
}

// Build a tally where each route key is ordered by dominant direction.
// e.g. if PDX→DEN=10 and DEN→PDX=2, key is "PDX↔DEN" (combined count=12).
function buildRouteTally(flights) {
  const dir = {};  // "A→B" directional counts
  flights.forEach(f => {
    if (f.origin && f.dest) {
      const k = `${f.origin}→${f.dest}`;
      dir[k] = (dir[k] || 0) + 1;
    }
  });
  const tally = {};
  Object.entries(dir).forEach(([k, count]) => {
    const [o, d] = k.split('→');
    const rev = `${d}→${o}`;
    const revCount = dir[rev] || 0;
    // Canonical key: dominant direction first (or forward if tied/first seen)
    const key = count >= revCount ? `${o}↔${d}` : `${d}↔${o}`;
    tally[key] = (tally[key] || 0) + count;
  });
  return tally;
}

function routeBreakdown(full) {
  const flights = [];
  Object.values(full).forEach(day => (day.flights||[]).forEach(f => flights.push(f)));
  const tally = buildRouteTally(flights);
  return Object.entries(tally).sort((a,b)=>b[1]-a[1]).slice(0,12);
}

function aircraftBreakdown(full) {
  const tally={};
  Object.values(full).forEach(day=>(day.flights||[]).forEach(f=>{
    if(f.aircraft) tally[f.aircraft]=(tally[f.aircraft]||0)+1;
  }));
  return Object.entries(tally).sort((a,b)=>b[1]-a[1]).slice(0,12);
}

async function render() {
  const {summary,full,airportCode,distUnits,homeLat,homeLon,zone} = await loadData();
  if (!summary.length) {
    document.getElementById('content').innerHTML='<div class="loading">No data yet — flights will appear here once logged.</div>';
    return;
  }
  const totalDays=summary.length;
  const totalFlights=summary.reduce((s,d)=>s+d.count,0);
  const avgPerDay=(totalFlights/totalDays).toFixed(1);
  const maxDay=summary.reduce((a,b)=>b.count>a.count?b:a);
  const hourAvg=avgByHour(summary);
  const peakHour=hourAvg.indexOf(Math.max(...hourAvg));
  const dowAvg=avgByDow(summary);
  const peakDowIdx=dowAvg.indexOf(Math.max(...dowAvg));
  const airlines=airlineBreakdown(full);
  const airports=routeBreakdown(full);
  const aircraft=aircraftBreakdown(full);
  const sorted=[...summary].reverse();
  const maxCount=Math.max(...summary.map(d=>d.count));
  const allRouteTally=routeTallyFromFull(full);
  const totalUniqueRoutes=Object.keys(allRouteTally).length;

  document.getElementById('content').innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Daily Average</div><div class="stat-value">${avgPerDay}</div><div class="stat-sub">flights/day over ${totalDays} days</div></div>
      <div class="stat-card"><div class="stat-label">Busiest Day</div><div class="stat-value">${maxDay.count}</div><div class="stat-sub">${maxDay.date}</div></div>
      <div class="stat-card"><div class="stat-label">Peak Hour</div><div class="stat-value">${peakHour}:00</div><div class="stat-sub">${hourAvg[peakHour].toFixed(1)} avg flights</div></div>
      <div class="stat-card"><div class="stat-label">Peak Day</div><div class="stat-value">${DAYS[peakDowIdx]}</div><div class="stat-sub">${dowAvg[peakDowIdx].toFixed(1)} avg flights</div></div>
      <div class="stat-card"><div class="stat-label">Unique Routes</div><div class="stat-value">${totalUniqueRoutes}</div><div class="stat-sub">unique routes</div></div>
    </div>

    <div class="charts-grid">
      <div class="panel chart-full"><div class="panel-title">▸ Average Flights by Hour of Day</div><canvas id="hourChart"></canvas></div>
      <div class="panel"><div class="panel-title">▸ Average Flights by Day of Week</div><canvas id="dowChart"></canvas></div>
      <div class="panel"><div class="panel-title">▸ Airline Breakdown (Top 12)</div><canvas id="airlineChart"></canvas></div>
      <div class="panel"><div class="panel-title">▸ Local vs Flyover</div><canvas id="localFlyoverChart"></canvas></div>
      <div class="panel"><div class="panel-title">▸ Top Routes (Top 12)</div><canvas id="airportChart"></canvas></div>
      <div class="panel"><div class="panel-title">▸ Top Aircraft (Top 12)</div><canvas id="aircraftChart"></canvas></div>
      <div class="panel chart-full">
        <div class="panel-title">▸ Route Heat Map<span id="routeMapSub" style="font-size:14px;letter-spacing:1px;color:var(--amber-dim);margin-left:12px"></span></div>
        <div id="routeMap" class="route-map-wrap"></div>
      </div>
      <div class="panel chart-full">
        <div class="panel-title">▸ Daily Flight Log — click a date for details</div>
        <table class="day-table">
          <thead><tr><th>Date</th><th>Flights</th><th>First Seen</th><th>Last Seen</th><th class="bar-col"></th></tr></thead>
          <tbody>${sorted.map(d=>`
            <tr onclick="window.location='/stats/${d.date}'" style="cursor:pointer">
              <td style="color:var(--amber-bright)">${d.date}</td>
              <td class="num">${d.count}</td>
              <td class="dim">${d.first_seen}</td>
              <td class="dim">${d.last_seen}</td>
              <td class="bar-col"><span class="bar-inline" style="width:${Math.round((d.count/maxCount)*120)}px"></span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  // Local vs flyover pie
  const lf = localVsFlyover(full, airportCode);
  new Chart(document.getElementById('localFlyoverChart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: [`Departing (${airportCode}→)`, 'Flyover', `Arriving (→${airportCode})`, 'Unknown'],
      datasets: [{
        data: [lf.departing, lf.flyover, lf.arriving, lf.unknown],
        backgroundColor: ['#ff6b3599','#69f0ae99','#ffb30099','#aaaaaa99'],
        borderColor:     ['#ff6b35',  '#69f0ae',  '#ffb300',  '#aaaaaa'],
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, cutout: '60%',
      plugins: {
        legend: { display: true, labels: { color: '#ffb300', font: { family: 'VT323', size: 16 }, padding: 10 }},
        tooltip: { callbacks: { label: ctx => {
          const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
          const pct = total ? ((ctx.parsed/total)*100).toFixed(1) : 0;
          return ` ${ctx.label} — ${ctx.parsed} (${pct}%)`;
        }}}
      }
    }
  });

  new Chart(document.getElementById('hourChart').getContext('2d'),{
    type:'bar',data:{labels:Array.from({length:24},(_,i)=>`${i}:00`),datasets:[{data:hourAvg,backgroundColor:hourAvg.map((_,i)=>i===peakHour?'rgba(255,107,53,0.4)':'rgba(255,179,0,0.2)'),borderColor:hourAvg.map((_,i)=>i===peakHour?'#ff6b35':'#ffb300'),borderWidth:1,borderRadius:2}]},options:CHART_OPT});

  new Chart(document.getElementById('dowChart').getContext('2d'),{
    type:'bar',data:{labels:DAYS,datasets:[{data:dowAvg,backgroundColor:dowAvg.map((_,i)=>i===peakDowIdx?'rgba(255,107,53,0.4)':'rgba(255,179,0,0.2)'),borderColor:dowAvg.map((_,i)=>i===peakDowIdx?'#ff6b35':'#ffb300'),borderWidth:1,borderRadius:2}]},options:CHART_OPT});

  new Chart(document.getElementById('airlineChart').getContext('2d'),{
    type:'doughnut',
    data:{labels:airlines.map(([k])=>k),datasets:[{data:airlines.map(([,v])=>v),backgroundColor:airlines.map((_,i)=>COLOURS[i%COLOURS.length]+'99'),borderColor:airlines.map((_,i)=>COLOURS[i%COLOURS.length]),borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{
      legend:{display:true,labels:{color:'#ffb300',font:{family:'VT323',size:16},padding:10}},
      tooltip:{callbacks:{label:ctx=>{const n=AIRLINE_NAMES[ctx.label]||ctx.label;const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return ` ${n} — ${ctx.parsed} (${((ctx.parsed/t)*100).toFixed(1)}%)`;}}}
    }}});

  const _routeCodes = new Set();
  airports.forEach(([r]) => { const [o,d]=r.split('↔'); if(o)_routeCodes.add(o); if(d)_routeCodes.add(d); });
  let _apInfo = {};
  try { _apInfo = await fetch(`/api/airport-coords?codes=${[..._routeCodes].join(',')}`).then(r=>r.json()); } catch(e) {}
  const routeApLabel = code => { const n=_apInfo[code]?.name; return n ? `${n} (${code})` : code; };

  new Chart(document.getElementById('airportChart').getContext('2d'),{
    type:'doughnut',
    data:{labels:airports.map(([k])=>k),datasets:[{data:airports.map(([,v])=>v),backgroundColor:airports.map((_,i)=>COLOURS[i%COLOURS.length]+'99'),borderColor:airports.map((_,i)=>COLOURS[i%COLOURS.length]),borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{
      legend:{display:true,labels:{color:'#ffb300',font:{family:'VT323',size:16},padding:10}},
      tooltip:{callbacks:{label:ctx=>{
        const [o,d]=ctx.label.split('↔');
        const t=ctx.dataset.data.reduce((a,b)=>a+b,0);
        const oc=_apInfo[o], dc=_apInfo[d];
        const dist = oc && dc ? ' · ' + distLabel(haversineDist(oc.lat,oc.lon,dc.lat,dc.lon,distUnits),distUnits) : '';
        return ` ${routeApLabel(o)} ↔ ${routeApLabel(d)}${dist} — ${ctx.parsed} (${((ctx.parsed/t)*100).toFixed(1)}%)`;
      }}}
    }}});

  if (aircraft.length) {
    new Chart(document.getElementById('aircraftChart').getContext('2d'),{
      type:'doughnut',
      data:{labels:aircraft.map(([k])=>k),datasets:[{data:aircraft.map(([,v])=>v),backgroundColor:aircraft.map((_,i)=>COLOURS[i%COLOURS.length]+'99'),borderColor:aircraft.map((_,i)=>COLOURS[i%COLOURS.length]),borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{
        legend:{display:true,labels:{color:'#ffb300',font:{family:'VT323',size:16},padding:10}},
        tooltip:{callbacks:{label:ctx=>{const n=AIRCRAFT_NAMES[ctx.label]||ctx.label;const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return ` ${n} — ${ctx.parsed} (${((ctx.parsed/t)*100).toFixed(1)}%)`;}}}      }}});
  }

  await buildRouteMap('routeMap', allRouteTally, 'routeMapSub', distUnits, homeLat, homeLon, zone);
}

// ── Route Heat Map ────────────────────────────────────────────────────────────
function routeTallyFromFull(full) {
  const flights = [];
  Object.values(full).forEach(day => (day.flights || []).forEach(f => flights.push(f)));
  return buildRouteTally(flights);
}

function gcPoints(lat1, lon1, lat2, lon2, steps=60) {
  const R = Math.PI / 180;
  const φ1=lat1*R, λ1=lon1*R, φ2=lat2*R, λ2=lon2*R;
  const a = Math.sin((φ2-φ1)/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ2-λ1)/2)**2;
  const Δ = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  if (Δ < 0.001) return [[lat1,lon1],[lat2,lon2]];
  const pts = [];
  for (let i=0; i<=steps; i++) {
    const f=i/steps, A=Math.sin((1-f)*Δ)/Math.sin(Δ), B=Math.sin(f*Δ)/Math.sin(Δ);
    const x=A*Math.cos(φ1)*Math.cos(λ1)+B*Math.cos(φ2)*Math.cos(λ2);
    const y=A*Math.cos(φ1)*Math.sin(λ1)+B*Math.cos(φ2)*Math.sin(λ2);
    const z=A*Math.sin(φ1)+B*Math.sin(φ2);
    pts.push([Math.atan2(z,Math.sqrt(x*x+y*y))/R, Math.atan2(y,x)/R]);
  }
  // Unwrap antimeridian crossings: keep longitudes continuous
  for (let i=1; i<pts.length; i++) {
    const dlon = pts[i][1] - pts[i-1][1];
    if (dlon > 180) pts[i][1] -= 360;
    else if (dlon < -180) pts[i][1] += 360;
  }
  // If the arc went east past the dateline (end lon > 180°), the algorithm chose the
  // Pacific path going east, putting the destination on the eastern world-copy ghost.
  // Shift everything −360° so it uses the western world copy instead — matching how
  // the farthest map places Asian airports at e.g. lon −246° rather than +114°.
  if (pts[pts.length-1][1] > 180) {
    for (let i=0; i<pts.length; i++) pts[i][1] -= 360;
  }
  return pts;
}

function heatColor(t) {
  if (t < 0.5) {
    const s = t*2;
    return `rgb(${Math.round(105+150*s)},${Math.round(240-61*s)},${Math.round(174*(1-s))})`;
  }
  const s = (t-0.5)*2;
  return `rgb(255,${Math.round(179*(1-s))},0)`;
}

let _routeMap = null;
async function buildRouteMap(mapId, tally, subId, distUnits, homeLat, homeLon, zone) {
  // Sort descending to tally all routes, but draw ascending so hot routes paint on top
  const entries = Object.entries(tally).sort((a,b)=>b[1]-a[1]).slice(0,300);
  if (!entries.length) return;

  const codes = new Set();
  entries.forEach(([r]) => { const [o,d]=r.split('↔'); codes.add(o); codes.add(d); });

  let coords = {};
  try {
    const r = await fetch(`/api/airport-coords?codes=${[...codes].join(',')}`);
    coords = await r.json();
  } catch(e) { return; }

  const valid = entries.filter(([r]) => { const [o,d]=r.split('↔'); return coords[o] && coords[d]; });
  if (!valid.length) return;

  if (_routeMap) { _routeMap.remove(); _routeMap = null; }
  const map = L.map(mapId, { zoomControl: true, attributionControl: false });
  _routeMap = map;
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18
  }).addTo(map);

  const sub = subId && document.getElementById(subId);
  const total = Object.keys(tally).length;
  if (sub) sub.textContent = valid.length < total ? `— ${valid.length} of ${total} drawn` : `— ${valid.length} drawn`;

  const maxCount = valid[0][1];
  const bounds = [];
  const tipOpts = { sticky: true, className: 'route-tip' };

  // Draw rarest first so most-frequent routes paint on top and stay visible.
  // Collect actual normalized arc endpoints for dot placement — pts[0]/pts[last]
  // already have the world-copy-adjusted longitude (e.g. HKG at −246° not +114°).
  const actualPos = {};
  const apLabel = code => { const n=coords[code]?.name; return n ? `${n} (${code})` : code; };
  [...valid].reverse().forEach(([route, count]) => {
    const [o,d] = route.split('↔');
    const oc = coords[o], dc = coords[d];
    const t = count / maxCount;
    const pts = gcPoints(oc.lat, oc.lon, dc.lat, dc.lon);
    bounds.push([oc.lat, oc.lon], [dc.lat, dc.lon]);
    if (!actualPos[o]) actualPos[o] = pts[0];
    if (!actualPos[d]) actualPos[d] = pts[pts.length-1];
    const dist = distLabel(haversineDist(oc.lat, oc.lon, dc.lat, dc.lon, distUnits), distUnits);
    L.polyline(pts, {
      color: heatColor(t),
      weight: Math.max(1, 1 + t * 4),
      opacity: 0.2 + t * 0.7,
    }).bindTooltip(`${apLabel(o)} ↔ ${apLabel(d)} · ${dist} — ${count} flight${count>1?'s':''}`, tipOpts).addTo(map);
  });

  Object.entries(actualPos).forEach(([code, pos]) => {
    const apCoord = coords[code];
    const homeDist = (homeLat != null && homeLon != null && apCoord)
      ? ' · ' + distLabel(haversineDist(homeLat, homeLon, apCoord.lat, apCoord.lon, distUnits), distUnits) + ' from home'
      : '';
    L.circleMarker(pos, {
      radius: 3, fillColor: '#ffb300', fillOpacity: 0.9, stroke: false
    }).bindTooltip(apLabel(code) + homeDist, { permanent: false, className: 'route-tip' }).addTo(map);
  });

  if (homeLat != null && homeLon != null) {
    L.circleMarker([homeLat, homeLon], {
      radius: 6, fillColor: '#ff3d00', fillOpacity: 0.95, color: '#ff9800', weight: 1.5
    }).bindTooltip('Home', { permanent: false, className: 'route-tip' }).addTo(map);
  }

  if (zone && zone.tl_y && zone.tl_x && zone.br_y && zone.br_x) {
    L.rectangle([[zone.tl_y, zone.tl_x], [zone.br_y, zone.br_x]], {
      color: '#69f0ae', weight: 1.5, fill: false, dashArray: '4 4', opacity: 0.7
    }).bindTooltip('Watch zone', { permanent: false, className: 'route-tip' }).addTo(map);
  }

  if (bounds.length) map.fitBounds(bounds, { padding: [20, 20], maxZoom: 6 });
}

render().catch(e=>{document.getElementById('content').innerHTML=`<div class="loading">Error: ${e.message}</div>`;});
</script>
</body>
</html>
