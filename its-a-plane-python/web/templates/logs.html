<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Logs — Flight Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0d0d0b; --amber: #ffb300; --amber-dim: #7a5500;
    --amber-glow: rgba(255,179,0,0.08); --amber-bright: #ffd54f;
    --green: #69f0ae; --red: #ff3d00; --orange: #ff9800;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--amber);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  .board-header {
    background: var(--amber);
    color: var(--bg);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .board-title {
    font-family: 'VT323', monospace;
    font-size: 32px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .back {
    font-family: 'VT323', monospace;
    font-size: 20px;
    letter-spacing: 2px;
    background: var(--bg);
    color: var(--amber);
    padding: 2px 12px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .pill {
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 2px;
    padding: 2px 10px;
    border: 1px solid var(--bg);
    cursor: pointer;
    background: transparent;
    color: var(--bg);
    text-transform: uppercase;
  }

  .pill:hover { background: rgba(0,0,0,0.15); }

  .pill.active { background: var(--bg); color: var(--amber); }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--amber-dim);
    background: rgba(255,179,0,0.03);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .toolbar a {
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--amber-dim);
    text-decoration: none;
    text-transform: uppercase;
  }

  .toolbar a:hover { color: var(--amber); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--amber-dim);
    flex-shrink: 0;
  }

  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.error { background: var(--red); }

  #status-text {
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--amber-dim);
  }

  .filter-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #filter-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--amber-dim);
    color: var(--amber);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 2px 6px;
    outline: none;
    width: 200px;
    letter-spacing: 1px;
  }

  #filter-input::placeholder { color: var(--amber-dim); }
  #filter-input:focus { border-color: var(--amber); }

  .filter-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--amber-dim);
  }

  #log-container {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
  }

  .log-line {
    white-space: pre-wrap;
    word-break: break-all;
    padding: 1px 0;
    border-bottom: 1px solid rgba(255,179,0,0.04);
  }

  .log-line.warn  { color: var(--orange); }
  .log-line.error { color: var(--red); }
  .log-line.info  { color: var(--amber); }
  .log-line.dim   { color: var(--amber-dim); }

  .log-line .ts   { color: var(--amber-dim); margin-right: 6px; }
  .log-line .proc { color: var(--amber-dim); margin-right: 6px; }
  .log-line .msg  { }

  .log-line.warn  .msg { color: var(--orange); }
  .log-line.error .msg { color: var(--red); }

  .empty-state {
    color: var(--amber-dim);
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 3px;
    text-align: center;
    margin-top: 60px;
  }
</style>
</head>
<body>

<div class="board-header">
  <span style="font-size:26px">✈</span>
  <div class="board-title">System Logs</div>
  <div class="header-right">
    <button class="pill active" id="btn-follow" onclick="toggleFollow()">Follow</button>
    <button class="pill" id="btn-clear" onclick="clearDisplay()">Clear</button>
    <a class="back" href="/">← BOARD</a>
  </div>
</div>

<div class="toolbar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Loading...</span>
  <span id="stdout-badge" style="font-family:'VT323',monospace;font-size:16px;letter-spacing:1px;padding:2px 8px;border:1px solid;display:none"></span>
  <div class="filter-wrap">
    <span class="filter-label">Filter</span>
    <input id="filter-input" type="text" placeholder="keyword..." oninput="applyFilter()">
  </div>
</div>

<div id="log-container"></div>

<script>
  let following = true;
  let lastTimestamp = null;
  let pollTimer = null;
  let allLines = [];
  let filterText = '';

  function toggleFollow() {
    following = !following;
    document.getElementById('btn-follow').classList.toggle('active', following);
    if (following) scrollToBottom();
  }

  function clearDisplay() {
    allLines = [];
    lastTimestamp = null;
    renderLines();
  }

  function applyFilter() {
    filterText = document.getElementById('filter-input').value.toLowerCase();
    renderLines();
  }

  function classifyLine(msg) {
    const l = msg.toLowerCase();
    if (/error|exception|traceback|critical|fail/i.test(l)) return 'error';
    if (/warn|warning/i.test(l)) return 'warn';
    if (/backing off|timeout|timed out/i.test(l)) return 'warn';
    return 'info';
  }

  function parseLine(raw) {
    // short-iso format: 2026-06-15T04:34:19+0000 hostname proc[pid]: message
    const m = raw.match(/^(\S+)\s+\S+\s+(\S+):\s+([\s\S]*)$/);
    if (m) return { ts: m[1], proc: m[2], msg: m[3], raw };
    return { ts: '', proc: '', msg: raw, raw };
  }

  function renderLines() {
    const container = document.getElementById('log-container');
    const visible = filterText
      ? allLines.filter(l => l.raw.toLowerCase().includes(filterText))
      : allLines;

    if (!visible.length) {
      container.innerHTML = '<div class="empty-state">NO LOG LINES</div>';
      return;
    }

    container.innerHTML = visible.map(p => {
      const cls = classifyLine(p.msg);
      return `<div class="log-line ${cls}"><span class="ts">${escHtml(p.ts)}</span><span class="proc">${escHtml(p.proc)}</span><span class="msg">${escHtml(p.msg)}</span></div>`;
    }).join('');

    if (following) scrollToBottom();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollToBottom() {
    const c = document.getElementById('log-container');
    c.scrollTop = c.scrollHeight;
  }

  function setStatus(state, text) {
    document.getElementById('status-dot').className = 'status-dot ' + state;
    document.getElementById('status-text').textContent = text;
  }

  async function loadInitial() {
    setStatus('', 'Loading...');
    try {
      const res = await fetch('/api/logs?n=500');
      const data = await res.json();
      if (data.error) { setStatus('error', 'Error: ' + data.error); return; }
      allLines = data.lines.map(parseLine);
      if (allLines.length) {
        // grab timestamp from last line for polling
        lastTimestamp = allLines[allLines.length - 1].ts || null;
      }
      renderLines();
      setStatus('live', `${allLines.length} lines — live`);
      schedulePoll();
    } catch(e) {
      setStatus('error', 'Failed to load: ' + e.message);
    }
  }

  function schedulePoll() {
    clearTimeout(pollTimer);
    pollTimer = setTimeout(poll, 3000);
  }

  async function poll() {
    try {
      const url = lastTimestamp ? `/api/logs?since=${encodeURIComponent(lastTimestamp)}` : '/api/logs?n=50';
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) { setStatus('error', data.error); schedulePoll(); return; }

      const newLines = data.lines.map(parseLine);
      // de-duplicate: drop lines that overlap with the last known timestamp
      const fresh = lastTimestamp
        ? newLines.filter(l => l.ts > lastTimestamp || (!l.ts && false))
        : newLines;

      if (fresh.length) {
        allLines = allLines.concat(fresh);
        // keep at most 2000 lines in memory
        if (allLines.length > 2000) allLines = allLines.slice(allLines.length - 2000);
        lastTimestamp = fresh[fresh.length - 1].ts || lastTimestamp;
        renderLines();
        setStatus('live', `${allLines.length} lines — live`);
      }
    } catch(e) {
      setStatus('error', 'Poll error: ' + e.message);
    }
    schedulePoll();
  }

  // pause follow when user scrolls up
  async function checkServiceFile() {
    try {
      const res = await fetch('/api/service-file');
      const data = await res.json();
      const badge = document.getElementById('stdout-badge');
      badge.style.display = '';
      if (data.error) {
        badge.textContent = 'SERVICE FILE: NOT FOUND';
        badge.style.color = 'var(--red)';
        badge.style.borderColor = 'var(--red)';
        return;
      }
      const content = data.content || '';
      const hasNull = /StandardOutput\s*=\s*null/i.test(content);
      const hasJournal = /StandardOutput\s*=\s*journal/i.test(content);
      const hasFile = /StandardOutput\s*=\s*file/i.test(content);
      const hasLine = /StandardOutput/i.test(content);
      if (hasNull) {
        badge.textContent = 'StandardOutput=null ✗ LOGS WILL BE LOST';
        badge.style.color = 'var(--red)';
        badge.style.borderColor = 'var(--red)';
      } else if (hasFile) {
        badge.textContent = 'StandardOutput=file ✗ NOT IN JOURNAL';
        badge.style.color = 'var(--orange)';
        badge.style.borderColor = 'var(--orange)';
      } else if (hasJournal) {
        badge.textContent = 'StandardOutput=journal ✓';
        badge.style.color = 'var(--green)';
        badge.style.borderColor = 'var(--green)';
      } else if (!hasLine) {
        badge.textContent = 'StandardOutput not set — default is journal ✓';
        badge.style.color = 'var(--green)';
        badge.style.borderColor = 'var(--green)';
      } else {
        badge.textContent = 'StandardOutput=' + (content.match(/StandardOutput\s*=\s*(\S+)/i)||[])[1];
        badge.style.color = 'var(--amber)';
        badge.style.borderColor = 'var(--amber)';
      }
    } catch(e) {}
  }

  document.addEventListener('DOMContentLoaded', () => {
    const c = document.getElementById('log-container');
    c.addEventListener('scroll', () => {
      const atBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 40;
      if (!atBottom && following) {
        following = false;
        document.getElementById('btn-follow').classList.remove('active');
      }
    });
    checkServiceFile();
    loadInitial();
  });
</script>
</body>
</html>
